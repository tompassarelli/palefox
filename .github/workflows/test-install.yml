name: Test install scripts

on:
  workflow_dispatch:
  push:
    paths:
      - install.sh
      - install.ps1
      - chrome/**
      - program/**
      - tools/generate-bootstrap.ts
      - build.ts
      - build.config.ts
      - .github/workflows/test-install.yml
  pull_request:
    paths:
      - install.sh
      - install.ps1
      - chrome/**
      - program/**
      - tools/generate-bootstrap.ts
      - build.ts
      - build.config.ts

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (compiles .uc.js + generates hash-pinned bootstrap)
        run: bun run build

      - name: Create Firefox profile
        run: MOZ_HEADLESS=1 firefox -CreateProfile default-release

      - name: Verify profile path
        run: |
          profiles_dir="${XDG_CONFIG_HOME:-$HOME/.config}/mozilla/firefox"
          test -d "$profiles_dir" || { echo "FAIL: $profiles_dir not created"; exit 1; }
          echo "Profile root confirmed at $profiles_dir"
          ls -la "$profiles_dir/"

      - name: Run install script
        run: PALEFOX_LOCAL=. ./install.sh

      - name: Verify installation
        run: |
          profiles_dir="${XDG_CONFIG_HOME:-$HOME/.config}/mozilla/firefox"
          profile=$(find "$profiles_dir" -maxdepth 1 -type d -name '*.default-release' | head -1)
          test -n "$profile" || { echo "FAIL: no *.default-release profile found"; exit 1; }

          # Profile chrome/ structure — hash-pinned loader expects exactly these dirs
          test -d "$profile/chrome" || { echo "FAIL: chrome/ missing"; exit 1; }
          test -d "$profile/chrome/CSS" || { echo "FAIL: chrome/CSS/ missing"; exit 1; }
          test -d "$profile/chrome/JS" || { echo "FAIL: chrome/JS/ missing"; exit 1; }
          test -d "$profile/chrome/utils" || { echo "FAIL: chrome/utils/ missing"; exit 1; }

          # CSS files (loaded via fx-autoconfig chrome://userstyles/skin/)
          test -f "$profile/chrome/CSS/palefox.uc.css" || { echo "FAIL: palefox.uc.css missing"; exit 1; }
          test -f "$profile/chrome/CSS/palefox-tabs.uc.css" || { echo "FAIL: palefox-tabs.uc.css missing"; exit 1; }

          # JS scripts
          test -f "$profile/chrome/JS/palefox-hello.uc.js" || { echo "FAIL: palefox-hello.uc.js missing"; exit 1; }
          test -f "$profile/chrome/JS/palefox-tabs.uc.js" || { echo "FAIL: palefox-tabs.uc.js missing"; exit 1; }
          test -f "$profile/chrome/JS/palefox-drawer.uc.js" || { echo "FAIL: palefox-drawer.uc.js missing"; exit 1; }

          # fx-autoconfig loader machinery
          test -f "$profile/chrome/utils/boot.sys.mjs" || { echo "FAIL: boot.sys.mjs missing"; exit 1; }
          test -f "$profile/chrome/utils/chrome.manifest" || { echo "FAIL: chrome.manifest missing"; exit 1; }

          # Stale-file cleanup — old monolithic palefox files should NOT be at chrome/ root
          for stale in palefox.css palefox-tabs.css palefox-which-key.css palefox-legacy.css userChrome.css user.css; do
            test ! -f "$profile/chrome/$stale" || { echo "FAIL: stale $stale should have been removed"; exit 1; }
          done

          # Prefs in user.js
          grep -q 'toolkit.legacyUserProfileCustomizations.stylesheets.*false' "$profile/user.js" || { echo "FAIL: legacy stylesheets pref must be false (loader doesn't depend on it)"; exit 1; }
          grep -q 'userChromeJS.enabled.*true' "$profile/user.js" || { echo "FAIL: userChromeJS.enabled missing"; exit 1; }
          grep -q 'sidebar.verticalTabs' "$profile/user.js" || { echo "FAIL: sidebar.verticalTabs pref missing"; exit 1; }
          grep -q 'sidebar.revamp' "$profile/user.js" || { echo "FAIL: sidebar.revamp pref missing"; exit 1; }
          grep -q 'sidebar.position_start' "$profile/user.js" || { echo "FAIL: sidebar.position_start pref missing"; exit 1; }

          # Hash-pinned bootstrap installed to Firefox install root
          app_dir="$(dirname "$(readlink -f "$(which firefox)")")"
          test -f "$app_dir/config.js" || { echo "FAIL: bootstrap config.js missing from $app_dir"; exit 1; }
          test -f "$app_dir/defaults/pref/config-prefs.js" || { echo "FAIL: config-prefs.js missing from $app_dir"; exit 1; }

          # Confirm it's the HASH-PINNED bootstrap (not stock fx-autoconfig)
          grep -q 'PALEFOX_PINNED' "$app_dir/config.js" || { echo "FAIL: $app_dir/config.js is not the hash-pinned bootstrap"; exit 1; }

          echo "--- chrome/ contents ---"
          ls -laR "$profile/chrome/"
          echo "--- user.js ---"
          cat "$profile/user.js"

  test-linux-flatpak:
    # Tests Flatpak path priority — no Flatpak runtime in CI, so we
    # create the directory structure to verify the installer prefers
    # the Flatpak path over native when both could exist.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create Flatpak profile directory
        run: mkdir -p ~/.var/app/org.mozilla.firefox/.mozilla/firefox/fake.default-release

      - name: Run install script
        run: PALEFOX_LOCAL=. ./install.sh

      - name: Verify Flatpak path used
        run: |
          profile="$HOME/.var/app/org.mozilla.firefox/.mozilla/firefox/fake.default-release"

          test -d "$profile/chrome" || { echo "FAIL: chrome/ missing at Flatpak path"; exit 1; }
          test -f "$profile/chrome/CSS/palefox.uc.css" || { echo "FAIL: palefox.uc.css missing"; exit 1; }
          test -f "$profile/chrome/JS/palefox-tabs.uc.js" || { echo "FAIL: palefox-tabs.uc.js missing"; exit 1; }
          grep -q 'toolkit.legacyUserProfileCustomizations.stylesheets.*false' "$profile/user.js" || { echo "FAIL: legacy stylesheets pref must be false"; exit 1; }
          grep -q 'userChromeJS.enabled.*true' "$profile/user.js" || { echo "FAIL: userChromeJS.enabled missing"; exit 1; }
          grep -q 'sidebar.verticalTabs' "$profile/user.js" || { echo "FAIL: sidebar.verticalTabs pref missing"; exit 1; }

          # Confirm native path was NOT used
          if [ -d "$HOME/.mozilla/firefox" ]; then
            echo "FAIL: native ~/.mozilla/firefox/ should not exist"
            exit 1
          fi

          echo "--- chrome/ contents ---"
          ls -laR "$profile/chrome/"
          echo "--- user.js ---"
          cat "$profile/user.js"

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create Firefox profile
        run: /Applications/Firefox.app/Contents/MacOS/firefox -CreateProfile default-release

      - name: Verify profile path
        run: |
          test -d "$HOME/Library/Application Support/Firefox/Profiles" || { echo "FAIL: Firefox/Profiles not created"; exit 1; }
          ls -la "$HOME/Library/Application Support/Firefox/Profiles/"

      - name: Run install script
        run: PALEFOX_LOCAL=. ./install.sh

      - name: Verify installation
        run: |
          profile=$(find "$HOME/Library/Application Support/Firefox/Profiles" -maxdepth 1 -type d -name '*.default-release' | head -1)
          test -n "$profile" || { echo "FAIL: no *.default-release profile found"; exit 1; }

          test -d "$profile/chrome" || { echo "FAIL: chrome/ missing"; exit 1; }
          test -f "$profile/chrome/CSS/palefox.uc.css" || { echo "FAIL: palefox.uc.css missing"; exit 1; }
          test -f "$profile/chrome/CSS/palefox-tabs.uc.css" || { echo "FAIL: palefox-tabs.uc.css missing"; exit 1; }
          test -f "$profile/chrome/JS/palefox-tabs.uc.js" || { echo "FAIL: palefox-tabs.uc.js missing"; exit 1; }
          test -f "$profile/chrome/utils/boot.sys.mjs" || { echo "FAIL: boot.sys.mjs missing"; exit 1; }
          grep -q 'toolkit.legacyUserProfileCustomizations.stylesheets.*false' "$profile/user.js" || { echo "FAIL: legacy stylesheets pref must be false"; exit 1; }
          grep -q 'userChromeJS.enabled.*true' "$profile/user.js" || { echo "FAIL: userChromeJS.enabled missing"; exit 1; }
          grep -q 'sidebar.verticalTabs' "$profile/user.js" || { echo "FAIL: sidebar.verticalTabs pref missing"; exit 1; }

          # Hash-pinned bootstrap installed to Firefox install root
          app_dir="/Applications/Firefox.app/Contents/Resources"
          test -f "$app_dir/config.js" || { echo "FAIL: bootstrap config.js missing from $app_dir"; exit 1; }
          grep -q 'PALEFOX_PINNED' "$app_dir/config.js" || { echo "FAIL: $app_dir/config.js is not the hash-pinned bootstrap"; exit 1; }

          echo "--- chrome/ contents ---"
          ls -laR "$profile/chrome/"
          echo "--- user.js ---"
          cat "$profile/user.js"

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create Firefox profile
        shell: pwsh
        run: |
          $ff = (Get-Command firefox -ErrorAction SilentlyContinue).Source
          if (-not $ff) {
            $ff = (Get-ChildItem "C:\Program Files\Mozilla Firefox\firefox.exe" -ErrorAction SilentlyContinue).FullName
          }
          & $ff -CreateProfile default-release

      - name: Verify profile path
        shell: pwsh
        run: |
          $profilesDir = "$env:APPDATA\Mozilla\Firefox\Profiles"
          if (-not (Test-Path $profilesDir)) { Write-Error "FAIL: $profilesDir not created"; exit 1 }
          Get-ChildItem $profilesDir

      - name: Run install script
        shell: pwsh
        run: |
          $env:PALEFOX_LOCAL = "."
          .\install.ps1

      - name: Verify installation
        shell: pwsh
        run: |
          $prof = Get-ChildItem "$env:APPDATA\Mozilla\Firefox\Profiles" -Directory -Filter "*.default-release" | Select-Object -First 1
          if (-not $prof) { Write-Error "FAIL: no *.default-release profile found"; exit 1 }

          if (-not (Test-Path "$($prof.FullName)\chrome")) { Write-Error "FAIL: chrome\ missing"; exit 1 }
          if (-not (Test-Path "$($prof.FullName)\chrome\CSS\palefox.uc.css")) { Write-Error "FAIL: palefox.uc.css missing"; exit 1 }
          if (-not (Test-Path "$($prof.FullName)\chrome\CSS\palefox-tabs.uc.css")) { Write-Error "FAIL: palefox-tabs.uc.css missing"; exit 1 }
          if (-not (Test-Path "$($prof.FullName)\chrome\JS\palefox-tabs.uc.js")) { Write-Error "FAIL: palefox-tabs.uc.js missing"; exit 1 }
          if (-not (Test-Path "$($prof.FullName)\chrome\utils\boot.sys.mjs")) { Write-Error "FAIL: boot.sys.mjs missing"; exit 1 }

          # Stale-file cleanup
          foreach ($stale in @("palefox.css","palefox-tabs.css","userChrome.css","user.css")) {
            if (Test-Path "$($prof.FullName)\chrome\$stale") {
              Write-Error "FAIL: stale $stale should have been removed"; exit 1
            }
          }

          $userJs = Get-Content "$($prof.FullName)\user.js" -Raw
          if ($userJs -notmatch 'toolkit\.legacyUserProfileCustomizations\.stylesheets.*false') { Write-Error "FAIL: legacy stylesheets pref must be false"; exit 1 }
          if ($userJs -notmatch 'userChromeJS\.enabled.*true') { Write-Error "FAIL: userChromeJS.enabled missing"; exit 1 }
          if ($userJs -notmatch "sidebar.verticalTabs") { Write-Error "FAIL: sidebar.verticalTabs pref missing"; exit 1 }

          Write-Host "--- chrome\ contents ---"
          Get-ChildItem "$($prof.FullName)\chrome" -Recurse
          Write-Host "--- user.js ---"
          Get-Content "$($prof.FullName)\user.js"

  test-idempotent-reinstall:
    # Hash-pinned model has no user-customizable files in chrome/ — every file
    # is overwritten on reinstall. Verify reinstall is idempotent (running
    # install.sh twice yields the same state) instead of preservation.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create Firefox profile
        run: |
          MOZ_HEADLESS=1 firefox -CreateProfile default-release
          profiles_dir="${XDG_CONFIG_HOME:-$HOME/.config}/mozilla/firefox"
          profile=$(find "$profiles_dir" -maxdepth 1 -type d -name '*.default-release' | head -1)
          echo "PROFILE=$profile" >> "$GITHUB_ENV"

      - name: First install
        run: PALEFOX_LOCAL=. ./install.sh

      - name: Snapshot after first install
        run: |
          find "$PROFILE/chrome" -type f -exec sha256sum {} \; | sort > /tmp/snapshot1.txt
          cat /tmp/snapshot1.txt

      - name: Second install (no changes between)
        run: PALEFOX_LOCAL=. ./install.sh

      - name: Verify identical state
        run: |
          find "$PROFILE/chrome" -type f -exec sha256sum {} \; | sort > /tmp/snapshot2.txt
          if ! diff /tmp/snapshot1.txt /tmp/snapshot2.txt; then
            echo "FAIL: chrome/ contents differ between identical reinstalls"
            exit 1
          fi
          echo "Idempotent reinstall confirmed."

  test-legacy-migration:
    # Old palefox versions wrote a monolithic userChrome.css. New install
    # should detect that, back it up to .legacy, and migrate to chrome/CSS/.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create Firefox profile with legacy userChrome.css
        run: |
          MOZ_HEADLESS=1 firefox -CreateProfile default-release
          profiles_dir="${XDG_CONFIG_HOME:-$HOME/.config}/mozilla/firefox"
          profile=$(find "$profiles_dir" -maxdepth 1 -type d -name '*.default-release' | head -1)
          echo "PROFILE=$profile" >> "$GITHUB_ENV"
          mkdir -p "$profile/chrome"
          cat > "$profile/chrome/userChrome.css" << 'LEGACY'
          /* #region dev-docs */
          /* old palefox monolithic CSS */
          /* #region css vars and theme handling */
          :root { --pfx-color: red; }
          /* MY OLD TWEAK */
          LEGACY

      - name: Run install script
        run: PALEFOX_LOCAL=. ./install.sh

      - name: Verify legacy migration
        run: |
          # Legacy file should be backed up
          test -f "$PROFILE/chrome/userChrome.css.legacy" || { echo "FAIL: legacy backup missing"; exit 1; }
          grep -q "MY OLD TWEAK" "$PROFILE/chrome/userChrome.css.legacy" || { echo "FAIL: legacy backup missing user content"; exit 1; }

          # Old userChrome.css should be GONE (new model doesn't recreate it —
          # palefox CSS now loads via chrome/CSS/ + chrome.manifest registration)
          test ! -f "$PROFILE/chrome/userChrome.css" || { echo "FAIL: old userChrome.css should have been removed"; exit 1; }

          # New CSS layout in place
          test -f "$PROFILE/chrome/CSS/palefox.uc.css" || { echo "FAIL: new chrome/CSS/palefox.uc.css missing"; exit 1; }

          echo "Legacy migration test passed."

  test-linux-librewolf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Install LibreWolf
        run: |
          sudo apt-get update
          sudo apt-get install -y extrepo xvfb
          sudo extrepo enable librewolf
          sudo apt-get update
          sudo apt-get install -y librewolf

      - name: Create real LibreWolf profile
        run: xvfb-run --auto-servernum librewolf -CreateProfile default-default

      - name: Verify profile path
        run: |
          profiles_dir="${XDG_CONFIG_HOME:-$HOME/.config}/librewolf/librewolf"
          test -d "$profiles_dir" || { echo "FAIL: $profiles_dir not created"; exit 1; }
          echo "Profile root confirmed at $profiles_dir"
          ls -la "$profiles_dir/"

      - name: Run install script with --librewolf
        run: PALEFOX_LOCAL=. ./install.sh --librewolf

      - name: Verify installation
        run: |
          profiles_dir="${XDG_CONFIG_HOME:-$HOME/.config}/librewolf/librewolf"
          profile=$(find "$profiles_dir" -maxdepth 1 -type d -name '*.default-default' | head -1)
          test -n "$profile" || { echo "FAIL: no *.default-default profile found"; exit 1; }

          test -d "$profile/chrome" || { echo "FAIL: chrome/ missing"; exit 1; }
          test -f "$profile/chrome/CSS/palefox.uc.css" || { echo "FAIL: palefox.uc.css missing"; exit 1; }
          test -f "$profile/chrome/JS/palefox-tabs.uc.js" || { echo "FAIL: palefox-tabs.uc.js missing"; exit 1; }
          grep -q 'toolkit.legacyUserProfileCustomizations.stylesheets.*false' "$profile/user.js" || { echo "FAIL: legacy stylesheets pref must be false"; exit 1; }
          grep -q 'userChromeJS.enabled.*true' "$profile/user.js" || { echo "FAIL: userChromeJS.enabled missing"; exit 1; }

          echo "--- chrome/ contents ---"
          ls -laR "$profile/chrome/"
          echo "--- user.js ---"
          cat "$profile/user.js"

  test-macos-librewolf:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Install LibreWolf
        run: brew install --cask librewolf

      - name: Create real LibreWolf profile
        run: /Applications/LibreWolf.app/Contents/MacOS/librewolf -CreateProfile default-default

      - name: Verify profile path
        run: |
          test -d "$HOME/Library/Application Support/librewolf/Profiles" || { echo "FAIL: librewolf/Profiles not created"; exit 1; }
          echo "Profile root confirmed"
          ls -la "$HOME/Library/Application Support/librewolf/Profiles/"

      - name: Run install script with --librewolf
        run: PALEFOX_LOCAL=. ./install.sh --librewolf

      - name: Verify installation
        run: |
          profile=$(find "$HOME/Library/Application Support/librewolf/Profiles" -maxdepth 1 -type d -name '*.default-default' | head -1)
          test -n "$profile" || { echo "FAIL: no *.default-default profile found"; exit 1; }

          test -d "$profile/chrome" || { echo "FAIL: chrome/ missing"; exit 1; }
          test -f "$profile/chrome/CSS/palefox.uc.css" || { echo "FAIL: palefox.uc.css missing"; exit 1; }
          test -f "$profile/chrome/JS/palefox-tabs.uc.js" || { echo "FAIL: palefox-tabs.uc.js missing"; exit 1; }
          grep -q 'toolkit.legacyUserProfileCustomizations.stylesheets.*false' "$profile/user.js" || { echo "FAIL: legacy stylesheets pref must be false"; exit 1; }
          grep -q 'userChromeJS.enabled.*true' "$profile/user.js" || { echo "FAIL: userChromeJS.enabled missing"; exit 1; }

          echo "--- chrome/ contents ---"
          ls -laR "$profile/chrome/"
          echo "--- user.js ---"
          cat "$profile/user.js"

  test-windows-librewolf:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Install LibreWolf
        shell: pwsh
        run: choco install librewolf -y

      - name: Create real LibreWolf profile
        shell: pwsh
        run: |
          $lwPath = (Get-Command librewolf -ErrorAction SilentlyContinue).Source
          if (-not $lwPath) {
            $lwExe = Get-ChildItem "C:\Program Files\LibreWolf\librewolf.exe" -ErrorAction SilentlyContinue
            if ($lwExe) { $lwPath = $lwExe.FullName }
          }
          & $lwPath -CreateProfile default-default

      - name: Verify profile path
        shell: pwsh
        run: |
          $lwProfiles = "$env:APPDATA\librewolf\Profiles"
          if (-not (Test-Path $lwProfiles)) { Write-Error "FAIL: $lwProfiles not created"; exit 1 }
          Write-Host "Profile root confirmed at $lwProfiles"
          Get-ChildItem $lwProfiles

      - name: Run install script with --librewolf
        shell: pwsh
        run: |
          $env:PALEFOX_LOCAL = "."
          .\install.ps1 --librewolf

      - name: Verify installation
        shell: pwsh
        run: |
          $prof = Get-ChildItem "$env:APPDATA\librewolf\Profiles" -Directory -Filter "*.default-default" | Select-Object -First 1
          if (-not $prof) { Write-Error "FAIL: no *.default-default profile found"; exit 1 }

          if (-not (Test-Path "$($prof.FullName)\chrome")) { Write-Error "FAIL: chrome\ missing"; exit 1 }
          if (-not (Test-Path "$($prof.FullName)\chrome\CSS\palefox.uc.css")) { Write-Error "FAIL: palefox.uc.css missing"; exit 1 }
          if (-not (Test-Path "$($prof.FullName)\chrome\JS\palefox-tabs.uc.js")) { Write-Error "FAIL: palefox-tabs.uc.js missing"; exit 1 }

          $userJs = Get-Content "$($prof.FullName)\user.js" -Raw
          if ($userJs -notmatch 'toolkit\.legacyUserProfileCustomizations\.stylesheets.*false') { Write-Error "FAIL: legacy stylesheets pref must be false"; exit 1 }
          if ($userJs -notmatch 'userChromeJS\.enabled.*true') { Write-Error "FAIL: userChromeJS.enabled missing"; exit 1 }

          Write-Host "--- chrome\ contents ---"
          Get-ChildItem "$($prof.FullName)\chrome" -Recurse
          Write-Host "--- user.js ---"
          Get-Content "$($prof.FullName)\user.js"
